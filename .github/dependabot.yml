# Dependabot configuration
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Root npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/Lima'
    commit-message:
      prefix: 'chore'
      include: 'scope'
    open-pull-requests-limit: 5
    labels:
      - 'dependencies'
    groups:
      opencode-ecosystem:
        patterns:
          - '@opencode-ai/*'
          - '@opentui/*'
        update-types:
          - 'minor'
          - 'patch'
      solid-ecosystem:
        patterns:
          - 'solid-js'
        update-types:
          - 'minor'
          - 'patch'
      dev-dependencies:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
